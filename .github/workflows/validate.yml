name: Validate Material Database

on:
  push:
    branches: [main-pr, main]
  pull_request:
    branches: [main-pr, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate material database
        run: make validate

      - name: Commit auto-generated UUIDs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No UUIDs were auto-generated"
          else
            git commit -m "chore: auto-generate missing UUIDs [skip ci]"
            git push
          fi
